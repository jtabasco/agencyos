version: '3.8'

services:
  agencyos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agencyos-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # Supabase config - update with your values
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agencyos-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: agencyos-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agencyos
    restart: unless-stopped
    networks:
      - agencyos-network

networks:
  agencyos-network:
    driver: bridge
